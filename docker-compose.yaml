services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_MAX_LOADED_MODELS: "2"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      PULL_MODELS: |
        0xIbra/supergemma4-26b-uncensored-gguf-v2:Q4_K_M=super-gemma:latest
        llama4:17b-scout-16e-instruct-q4_K_M=llama4:latest
        aispin/qwen2.5-7b-instruct-abliterated-v2.q4_k_s.gguf=qwen25:latest
        dfebrero/DavidAU-Llama-3.2-8X3B-MOE-Dark-Champion-Instruct-uncensored-abliterated-18.4B=dark-champion:latest
        dolphin3:8b=dolphin:latest
        huihui-ai/deepseek-r1-abliterated:14b=deepseek-r1:latest
        huihui-ai/hermes3-abliterated:8b=hermes:latest
        hf.co/HauhauCS/Qwen3.6-27B-Uncensored-HauhauCS-Aggressive:Q4_K_P=qwen36:latest
    entrypoint:
      - sh
      - -c
    command:
      - |
        echo "$$PULL_MODELS" | while IFS='=' read -r model alias; do
          model=$$(echo "$$model" | tr -d '[:space:]')
          [ -z "$$model" ] && continue
          if ! ollama pull "$$model"; then
            echo "WARNING: Failed to pull $$model"
            continue
          fi

          alias=$$(echo "$$alias" | tr -d '[:space:]')
          if [ -n "$$alias" ]; then
            ollama rm "$$alias" >/dev/null 2>&1 || true
            ollama cp "$$model" "$$alias"
          fi
        done
    restart: "no"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    volumes:
      - ./data/open-webui:/app/backend/data
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:-please-change-this-secret}"
      WEBUI_AUTH: "${WEBUI_AUTH:-false}"
      DEFAULT_MODELS: "${DEFAULT_MODEL:-qwen25:latest}"
      ENABLE_SIGNUP: "true"
    restart: unless-stopped

  cli:
    image: paulgauthier/aider:latest
    container_name: aicli
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    volumes:
      - "${MOUNT_DIR:-.}:/app"
    environment:
      OLLAMA_API_BASE: "http://ollama:11434"
      AIDER_MODEL: "ollama_chat/${DEFAULT_MODEL:-qwen25:latest}"
    working_dir: /app
    stdin_open: true
    tty: true
    profiles:
      - cli
